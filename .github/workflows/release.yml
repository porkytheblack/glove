name: Release

# Auto-bump + publish via Changesets. Declare intent in your PR with
# `pnpm changeset` (pick patch/minor/major + a note); this workflow does the rest:
#
#   • Push to main WITH pending changesets  → opens/updates a "Version Packages"
#     PR that applies the bumps and writes CHANGELOGs. That PR is the preview —
#     review it, then merge.
#   • Push to main with NO pending changesets (the Version PR just merged, or a
#     package's version is simply ahead of npm) → runs `pnpm release`, which
#     builds the publishable set and `changeset publish`es anything not yet on npm.
#
# Requires:
#   • NPM_TOKEN secret (npm automation token, publish rights).
#   • Settings → Actions → General: "Allow GitHub Actions to create and approve
#     pull requests" enabled, so the action can open the Version PR.
on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write # commit version bumps / push the Version PR branch
  pull-requests: write # open the "Version Packages" PR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so changesets can read git history for changelogs.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pnpm version is pinned by the root package.json `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Writes an .npmrc that authenticates via NODE_AUTH_TOKEN.
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        with:
          version: pnpm run version # applies changesets: bumps + CHANGELOGs
          publish: pnpm run release # build the publishable set + changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
