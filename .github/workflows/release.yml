name: Release

# Publishes changed packages to npm automatically on every merge to main.
# Versioning is manual: bump the package.json `version` in your PR; on merge,
# `pnpm publish -r` ships only packages whose version isn't already on npm
# (unchanged ones are no-ops) and rewrites workspace:* deps to concrete
# versions. So a normal merge that bumps nothing publishes nothing.
#
# Control real-vs-dry with a repository VARIABLE (Settings → Secrets and
# variables → Actions → Variables tab), not code:
#   • DRY_RUN = true  → pack + validate, no upload
#   • unset / anything else → publish for real
#
# Requires an NPM_TOKEN repository SECRET (npm automation token, publish rights).
on:
  push:
    branches: [main]
    paths:
      - "packages/**"
  workflow_dispatch: {} # manual re-run escape hatch; obeys the same DRY_RUN var

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is pinned by the root package.json `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Writes an .npmrc that authenticates via NODE_AUTH_TOKEN.
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      # dist/ is gitignored, so build before publish. The `...` filters pull in
      # each REPL's workspace deps (glove-core, glove-scratchpad, glove-sql,
      # glove-mcp) and build everything in topological order.
      - name: Build the publishable set
        run: >-
          pnpm
          --filter "glove-python..."
          --filter "glove-js..."
          --filter "glove-lisp..."
          build

      # `-r publish` publishes only packages whose version isn't yet on npm.
      # Set the DRY_RUN repo variable to true to validate without uploading.
      - name: Publish
        run: >-
          pnpm -r
          --filter glove-core
          --filter glove-scratchpad
          --filter glove-sql
          --filter glove-mcp
          --filter glove-python
          --filter glove-js
          --filter glove-lisp
          publish --access public --no-git-checks
          ${{ vars.DRY_RUN == 'true' && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
