<svg xmlns="http://www.w3.org/2000/svg" width="960" height="250" viewBox="0 0 960 250" role="img">
<rect width="960" height="250" fill="#fcfcfb" rx="8"/>
<text x="16" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0b0b0b" text-anchor="start" font-weight="600">How a program runs: parse → validate → run, behind a sandbox gate</text><text x="16" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e" text-anchor="start" font-weight="400">glove-python · the same async tree-walker architecture as glove-js, with Python semantics</text><rect x="16" y="92" width="199" height="116" rx="8" fill="#fcfcfb" stroke="rgba(11,11,11,0.14)"/><text x="115.5" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0b0b0b" text-anchor="middle" font-weight="600">parse</text><text x="115.5" y="142" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">@lezer/python</text><text x="115.5" y="166" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">pure-JS, no WASM</text><text x="115.5" y="183" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">f-strings, comprehensions</text><line x1="221" y1="150" x2="253" y2="150" stroke="#898781" stroke-width="1.5"/><polygon points="253.0,150.0 246.6,152.9 246.6,147.1" fill="#898781"/><rect x="259" y="92" width="199" height="116" rx="8" fill="#fcfcfb" stroke="rgba(11,11,11,0.14)"/><text x="358.5" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0b0b0b" text-anchor="middle" font-weight="600">normalize + reject</text><text x="358.5" y="142" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">CST → AST</text><text x="358.5" y="166" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">subset only —</text><text x="358.5" y="183" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">import/class/dunder rejected</text><line x1="464" y1="150" x2="496" y2="150" stroke="#898781" stroke-width="1.5"/><polygon points="496.0,150.0 489.6,152.9 489.6,147.1" fill="#898781"/><rect x="502" y="92" width="199" height="116" rx="8" fill="#fcfcfb" stroke="rgba(11,11,11,0.14)"/><text x="601.5" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0b0b0b" text-anchor="middle" font-weight="600">run</text><text x="601.5" y="142" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">async tree-walk</text><text x="601.5" y="166" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">fuel budget · depth cap</text><text x="601.5" y="183" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">AbortSignal · exactly-once</text><line x1="707" y1="150" x2="739" y2="150" stroke="#898781" stroke-width="1.5"/><polygon points="739.0,150.0 732.6,152.9 732.6,147.1" fill="#898781"/><rect x="745" y="92" width="199" height="116" rx="8" fill="#fdf5f5" stroke="#d03b3b"/><text x="844.5" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#d03b3b" text-anchor="middle" font-weight="600">member gate</text><text x="844.5" y="142" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">members.ts</text><text x="844.5" y="166" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">dunder (__*) blocked</text><text x="844.5" y="183" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="middle" font-weight="400">per-type method allowlist</text><text x="16" y="242" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">Values are plain JS (no Python object graph), so blocking __-attributes closes the ().__class__.__subclasses__() escape at its first hop.</text></svg>