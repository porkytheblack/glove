<text x="16" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0b0b0b" text-anchor="start" font-weight="600">Free to choose among three REPL languages, models pick Python</text><text x="16" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e" text-anchor="start" font-weight="400">Which execute_* tool the model calls · 6 models × 10 tasks · one neutral preamble, counterbalanced by presentation order</text><rect x="16" y="58" width="12" height="12" rx="3" fill="#52514e"/><text x="34" y="68" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e" text-anchor="start" font-weight="400">Python listed first</text><rect x="176" y="58" width="12" height="12" rx="3" fill="none" stroke="#52514e" stroke-width="1.5"/><text x="194" y="68" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e" text-anchor="start" font-weight="400">Lisp listed first (reversed)</text><line x1="52" y1="336" x2="594" y2="336" stroke="#e1e0d9" stroke-width="1"/><text x="44" y="340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="end" font-weight="400" font-variant-numeric="tabular-nums">0%</text><line x1="52" y1="276" x2="594" y2="276" stroke="#e1e0d9" stroke-width="1"/><text x="44" y="280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="end" font-weight="400" font-variant-numeric="tabular-nums">25%</text><line x1="52" y1="216" x2="594" y2="216" stroke="#e1e0d9" stroke-width="1"/><text x="44" y="220" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="end" font-weight="400" font-variant-numeric="tabular-nums">50%</text><line x1="52" y1="156" x2="594" y2="156" stroke="#e1e0d9" stroke-width="1"/><text x="44" y="160" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="end" font-weight="400" font-variant-numeric="tabular-nums">75%</text><line x1="52" y1="96" x2="594" y2="96" stroke="#e1e0d9" stroke-width="1"/><text x="44" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="end" font-weight="400" font-variant-numeric="tabular-nums">100%</text><path d="M 92.75 336 L 92.75 112 Q 92.75 108 96.75 108 L 114.75 108 Q 118.75 108 118.75 112 L 118.75 336 Z" fill="#2a78d6"/><rect x="120.75" y="135.99999999999997" width="26" height="200.00000000000003" rx="3" fill="#fcfcfb" stroke="#2a78d6" stroke-width="2"/><text x="105.75" y="101" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">95</text><text x="133.75" y="128.99999999999997" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">83</text><text x="119.75" y="356" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">Python</text><path d="M 228.25 336 L 228.25 336 Q 228.25 336 228.25 336 L 254.25 336 Q 254.25 336 254.25 336 L 254.25 336 Z" fill="#1baf7a"/><rect x="256.25" y="324" width="26" height="12" rx="3" fill="#fcfcfb" stroke="#1baf7a" stroke-width="2"/><text x="241.25" y="329" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">0</text><text x="269.25" y="317" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">5</text><text x="255.25" y="356" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">JavaScript</text><path d="M 363.75 336 L 363.75 336 Q 363.75 336 363.75 336 L 389.75 336 Q 389.75 336 389.75 336 L 389.75 336 Z" fill="#b07820"/><rect x="391.75" y="320" width="26" height="16" rx="3" fill="#fcfcfb" stroke="#b07820" stroke-width="2"/><text x="376.75" y="329" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">0</text><text x="404.75" y="313" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">7</text><text x="390.75" y="356" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">Clojure</text><path d="M 499.25 336 L 499.25 328 Q 499.25 324 503.25 324 L 521.25 324 Q 525.25 324 525.25 328 L 525.25 336 Z" fill="#c3c2b7"/><rect x="527.25" y="324" width="26" height="12" rx="3" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="2"/><text x="512.25" y="317" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">5</text><text x="540.25" y="317" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">5</text><text x="526.25" y="356" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">mixed</text><line x1="52" y1="336" x2="594" y2="336" stroke="#c3c2b7" stroke-width="1"/><text x="610" y="102" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="start" font-weight="600">The preference is genuine</text><text x="610" y="126" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">Python wins 95% first-listed,</text><text x="610" y="143" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">and still 83% when Lisp leads —</text><text x="610" y="160" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">so it is not an ordering effect.</text><text x="610" y="177" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400"></text><text x="610" y="194" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">Clojure is chosen ≤7% even</text><text x="610" y="211" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">with the first-listed advantage.</text><text x="610" y="228" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400"></text><text x="610" y="245" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">Having three surfaces costs</text><text x="610" y="262" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#52514e" text-anchor="start" font-weight="400">nothing: pass 53/60 vs 55/60.</text></svg>