5.5 144.53333333333333 L 165.5 316 Z" fill="#86b6ef"/><text x="137.5" y="118.53333333333333" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">78%</text><text x="137.5" y="133.53333333333333" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#52514e" text-anchor="middle" font-weight="400" font-variant-numeric="tabular-nums">47/60</text><text x="137.5" y="336" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">jsrepl</text><text x="137.5" y="352" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#898781" text-anchor="middle" font-weight="400">as first written</text><path d="M 280.5 316 L 280.5 118.4 Q 280.5 114.4 284.5 114.4 L 332.5 114.4 Q 336.5 114.4 336.5 118.4 L 336.5 316 Z" fill="#2a78d6"/><text x="308.5" y="92.4" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#0b0b0b" text-anchor="middle" font-weight="700" font-variant-numeric="tabular-nums">90%</text><text x="308.5" y="107.4" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#52514e" text-anchor="middle" font-weight="400" font-variant-numeric="tabular-nums">54/60</text><text x="308.5" y="336" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">+ framing</text><text x="308.5" y="352" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#898781" text-anchor="middle" font-weight="400">execute_js is the only tool</text><path d="M 451.5 316 L 451.5 103.59322033898306 Q 451.5 99.59322033898306 455.5 99.59322033898306 L 503.5 99.59322033898306 Q 507.5 99.59322033898306 507.5 103.59322033898306 L 507.5 316 Z" fill="#104281"/><text x="479.5" y="77.59322033898306" font-family