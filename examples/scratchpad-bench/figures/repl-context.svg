<text x="16" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0b0b0b" text-anchor="start" font-weight="600">Folding capabilities behind one tool cuts peak context ~2×</text><text x="16" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e" text-anchor="start" font-weight="400">Median peak context tokens per cell · the 5-arm run where every surface shares one roster and grader</text><line x1="178" y1="78" x2="178" y2="254" stroke="#e1e0d9" stroke-width="1"/><text x="178" y="270" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="middle" font-weight="400" font-variant-numeric="tabular-nums">0</text><line x1="391.0769230769231" y1="78" x2="391.0769230769231" y2="254" stroke="#e1e0d9" stroke-width="1"/><text x="391.0769230769231" y="270" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="middle" font-weight="400" font-variant-numeric="tabular-nums">2k</text><line x1="604.1538461538462" y1="78" x2="604.1538461538462" y2="254" stroke="#e1e0d9" stroke-width="1"/><text x="604.1538461538462" y="270" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="middle" font-weight="400" font-variant-numeric="tabular-nums">4k</text><text x="166" y="99" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="end" font-weight="600">baseline</text><text x="166" y="113" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#898781" text-anchor="end" font-weight="400">~32 tools folded directly</text><path d="M 178 90 L 685.9173076923078 90 Q 689.9173076923078 90 689.9173076923078 94 L 689.9173076923078 104 Q 689.9173076923078 108 685.9173076923078 108 L 178 108 Z" fill="#898781"/><text x="697.9173076923078" y="103" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="start" font-weight="400" font-variant-numeric="tabular-nums">4,805</text><text x="166" y="133" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="end" font-weight="600">SQL</text><text x="166" y="147" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#898781" text-anchor="end" font-weight="400">execute_sql</text><path d="M 178 124 L 412.6461538461539 124 Q 416.6461538461539 124 416.6461538461539 128 L 416.6461538461539 138 Q 416.6461538461539 142 412.6461538461539 142 L 178 142 Z" fill="#2a78d6"/><text x="424.6461538461539" y="137" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#006300" text-anchor="start" font-weight="600" font-variant-numeric="tabular-nums">2,240  2.1× smaller</text><text x="166" y="167" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="end" font-weight="600">lisp</text><text x="166" y="181" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#898781" text-anchor="end" font-weight="400">execute_lisp</text><path d="M 178 158 L 457.92499999999995 158 Q 461.92499999999995 158 461.92499999999995 162 L 461.92499999999995 172 Q 461.92499999999995 176 457.92499999999995 176 L 178 176 Z" fill="#2a78d6"/><text x="469.92499999999995" y="171" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#006300" text-anchor="start" font-weight="600" font-variant-numeric="tabular-nums">2,665  1.8× smaller</text><text x="166" y="201" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="end" font-weight="600">jsrepl</text><text x="166" y="215" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#898781" text-anchor="end" font-weight="400">execute_js</text><path d="M 178 192 L 454.19615384615383 192 Q 458.19615384615383 192 458.19615384615383 196 L 458.19615384615383 206 Q 458.19615384615383 210 454.19615384615383 210 L 178 210 Z" fill="#2a78d6"/><text x="466.19615384615383" y="205" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#006300" text-anchor="start" font-weight="600" font-variant-numeric="tabular-nums">2,630  1.8× smaller</text><text x="166" y="235" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="end" font-weight="600">lispfns</text><text x="166" y="249" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#898781" text-anchor="end" font-weight="400">execute_lisp (fn mode)</text><path d="M 178 226 L 480.40461538461534 226 Q 484.40461538461534 226 484.40461538461534 230 L 484.40461538461534 240 Q 484.40461538461534 244 480.40461538461534 244 L 178 244 Z" fill="#2a78d6"/><text x="492.40461538461534" y="239" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#006300" text-anchor="start" font-weight="600" font-variant-numeric="tabular-nums">2,876  1.7× smaller</text><text x="16" y="298" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="start" font-weight="400">The three fn-mode REPL surfaces are equivalent here; in the Python run they cluster at 3.5–4.2k with result-shape discovery on — the row data still never enters context, only a one-time catalog.</text></svg>