<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img">
<rect width="960" height="430" fill="#fcfcfb" rx="8"/>
<text x="16" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0b0b0b" text-anchor="start" font-weight="600">One capability catalog, three one-tool REPL surfaces</text><text x="16" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e" text-anchor="start" font-weight="400">The tools are FUNCTIONS the model calls inside a persistent sandbox — not tool definitions loaded into context</text><rect x="16" y="92" width="176" height="150" rx="8" fill="#fcfcfb" stroke="rgba(11,11,11,0.14)"/><text x="104" y="116" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">MCP servers</text><text x="104" y="140" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">GitHub</text><text x="104" y="160" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">Sentry</text><text x="104" y="180" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">Linear</text><text x="104" y="200" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">PagerDuty</text><text x="104" y="220" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">Slack, Notion…</text><text x="104" y="260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="middle" font-weight="400" font-variant-numeric="tabular-nums">~32 tools</text><line x1="198" y1="167" x2="286" y2="167" stroke="#898781" stroke-width="1.5"/><polygon points="286.0,167.0 279.6,169.9 279.6,164.1" fill="#898781"/><text x="242" y="158" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="middle" font-weight="400">fnsFromMcp</text><rect x="292" y="92" width="220" height="150" rx="8" fill="#f4f8fe" stroke="#2a78d6"/><text x="402" y="116" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#1c5cab" text-anchor="middle" font-weight="600">Shared ToolFn catalog</text><text x="402" y="138" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">name · input schema · call</text><text x="402" y="156" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">readOnlyHint (read/write)</text><text x="402" y="184" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#898781" text-anchor="middle" font-weight="400">discovery, in-band:</text><text x="402" y="202" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">fns() · describe()</text><text x="402" y="220" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="middle" font-weight="400">sampleResultShapes</text><line x1="518" y1="167" x2="586" y2="113" stroke="#898781" stroke-width="1.5"/><polygon points="586.0,113.0 582.8,119.2 579.2,114.7" fill="#898781"/><rect x="592" y="92" width="352" height="42" rx="8" fill="#fcfcfb" stroke="#b07820"/><rect x="592" y="92" width="5" height="42" rx="2" fill="#b07820"/><text x="606" y="110" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="start" font-weight="600">execute_lisp</text><text x="606" y="125" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#52514e" text-anchor="start" font-weight="400">(github_pull_requests {:state "open"})</text><text x="932" y="110" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="end" font-weight="400">glove-lisp</text><line x1="518" y1="167" x2="586" y2="165" stroke="#898781" stroke-width="1.5"/><polygon points="586.0,165.0 579.7,168.0 579.5,162.3" fill="#898781"/><rect x="592" y="144" width="352" height="42" rx="8" fill="#fcfcfb" stroke="#1baf7a"/><rect x="592" y="144" width="5" height="42" rx="2" fill="#1baf7a"/><text x="606" y="162" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="start" font-weight="600">execute_js</text><text x="606" y="177" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#52514e" text-anchor="start" font-weight="400">github.list_pull_requests({ state: "open" })</text><text x="932" y="162" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="end" font-weight="400">glove-js</text><line x1="518" y1="167" x2="586" y2="217" stroke="#898781" stroke-width="1.5"/><polygon points="586.0,217.0 579.2,215.5 582.5,210.9" fill="#898781"/><rect x="592" y="196" width="352" height="42" rx="8" fill="#fcfcfb" stroke="#2a78d6"/><rect x="592" y="196" width="5" height="42" rx="2" fill="#2a78d6"/><text x="606" y="214" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0b0b0b" text-anchor="start" font-weight="600">execute_python</text><text x="606" y="229" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#52514e" text-anchor="start" font-weight="400">github.list_pull_requests(state="open")</text><text x="932" y="214" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="end" font-weight="400">glove-python</text><text x="592" y="250" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" fill="#898781" text-anchor="start" font-weight="400">one tool each · persistent · sandboxed</text><rect x="16" y="288" width="928" height="118" rx="8" fill="#faf9f5" stroke="#e1e0d9"/><text x="32" y="314" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#0b0b0b" text-anchor="start" font-weight="600">The off-context loop — the reason it works</text><text x="32" y="338" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="start" font-weight="400">① call fires immediately (exactly-once effect)</text><text x="32" y="355" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="start" font-weight="400">② result data stays in the session (a top-level binding — prs, rows)</text><text x="32" y="372" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="start" font-weight="400">③ the model computes over it in the sandbox (filter · group · argmax · branch)</text><text x="32" y="389" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#52514e" text-anchor="start" font-weight="400">④ only the LAST expression's value returns to context — bounded by structural elision</text></svg>